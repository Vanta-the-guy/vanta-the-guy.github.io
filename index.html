<script>
  (function() {
    const noticeKey = 'deltaruneAudioRemovedNoticeShown';
    const noticeMessage = 'audio removed since dmacs will shut me down';

    try {
      if (localStorage.getItem(noticeKey) !== 'true') {
        alert(noticeMessage);
        localStorage.setItem(noticeKey, 'true');
      }
    } catch (error) {
      alert(noticeMessage);
    }

    const OriginalAudioContext = window.AudioContext || window.webkitAudioContext;
    if (OriginalAudioContext) {
      const originalCreateGain = OriginalAudioContext.prototype.createGain;

      class SilentAudioContext extends OriginalAudioContext {
        constructor() {
          super(...arguments);
          const silence = originalCreateGain.call(this);
          silence.gain.value = 0;
          silence.connect(super.destination);
          this._silentDestination = silence;
        }
        get destination() {
          return this._silentDestination;
        }
      }
      window.AudioContext = SilentAudioContext;
      window.webkitAudioContext = SilentAudioContext;
    }
    const originalPlay = HTMLMediaElement.prototype.play;
    HTMLMediaElement.prototype.play = function() {
      this.muted = true;
      this.volume = 0;
      return originalPlay.call(this);
    };
    const OriginalAudio = window.Audio;
    window.Audio = function() {
      const audio = new OriginalAudio(...arguments);
      audio.muted = true;
      audio.volume = 0;
      return audio;
    };
    window.Audio.prototype = OriginalAudio.prototype;
  })();
</script>

  <script>
    let gamestarted = false;
    function updateButton() {}
    function loadChapter(chapter) {
      const chapterPath = `chapter${chapter}/`;
      fetch(`${chapterPath}index.html`).then(res => {
        if (!res.ok) {
          throw new Error(`Failed to load ${chapterPath}index.html`);
        }
        return res.text();
      }).then(html => {
        gamestarted = true;
        const chapterDocument = new DOMParser().parseFromString(html, 'text/html');
        let base = chapterDocument.querySelector('base');
        if (!base) {
          base = chapterDocument.createElement('base');
          chapterDocument.head.prepend(base);
        }
        base.href = new URL(chapterPath, window.location.href).href;
        document.documentElement.innerHTML = chapterDocument.documentElement.innerHTML;
        document.documentElement.querySelectorAll('script').forEach(oldScript => {
          const newScript = document.createElement('script');
          if (oldScript.src) {
            newScript.src = oldScript.src;
          } else {
            newScript.textContent = oldScript.textContent;
          }
          document.body.appendChild(newScript);
        });
      }).catch(error => {
        console.error(error);
        window.location.href = `${chapterPath}index.html`;
      });
    }

    });
    let selectedChapter = null;
    document.addEventListener('keydown', function(event) {
      if (!gamestarted) {
      if (event.key === 'ArrowUp') {
        if (selectedChapter === null) {
          selectedChapter = 0;
          document.querySelectorAll('.row')[0].classList.add("selected");
        } else {
          document.querySelectorAll('.row')[selectedChapter].classList.remove("selected");
          selectedChapter--;
          if (selectedChapter < 0) {
            selectedChapter = document.querySelectorAll('.row').length - 1;
          }
          document.querySelectorAll('.row')[selectedChapter].classList.add("selected");
        }
      } else if (event.key === 'ArrowDown') {
        if (selectedChapter === null) {
          selectedChapter = 0;
          document.querySelectorAll('.row')[0].classList.add("selected");
        } else {
          if (selectedChapter+1 >= document.querySelectorAll('.row').length) {
            document.querySelectorAll('.row')[selectedChapter].classList.remove("selected");
            selectedChapter = 0;
            document.querySelectorAll('.row')[0].classList.add("selected");
          } else {
            document.querySelectorAll('.row')[selectedChapter].classList.remove("selected");
            selectedChapter++;
            document.querySelectorAll('.row')[selectedChapter].classList.add("selected");
          }
        }
      } else if (event.key === 'Enter') {
        if (selectedChapter !== null) {
          window.location.href = document.querySelectorAll('.row')[selectedChapter].href;
        }
      }

    });
